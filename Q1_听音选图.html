<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Listen &amp; Click</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:"Nunito","PingFang SC","Microsoft YaHei",sans-serif;}
#app{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#a8d8f0 0%,#c8eaf8 28%,#dff2fc 50%,#fdf6e8 74%,#fdecc8 100%);
  overflow:hidden;
}
/* soft floating cloud blobs for decoration */
#stars{position:absolute;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.82);
  filter:blur(1px);
}
@keyframes twinkle{0%,100%{opacity:.25;transform:scale(1);}50%{opacity:.9;transform:scale(1.15);}}
#top-bar{
  position:relative;z-index:10;width:100%;max-width:920px;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px 0;flex-shrink:0;
}
#score-box{font-size:16px;font-weight:800;color:#d97706;}
#timer-wrap{flex:1;margin:0 20px;display:flex;flex-direction:column;align-items:center;gap:3px;}
#timer-bar-bg{width:100%;height:10px;background:rgba(0,0,0,0.08);border-radius:5px;overflow:hidden;}
#timer-bar{height:100%;border-radius:5px;background:linear-gradient(90deg,#34d399,#38bdf8);width:100%;
  transition:width 0.25s linear,background 0.5s;}
#timer-txt{font-size:12px;font-weight:700;color:rgba(90,80,60,0.65);letter-spacing:0.05em;}
#mute-btn{background:rgba(255,255,255,0.55);border:1.5px solid rgba(180,160,120,0.4);
  border-radius:8px;padding:5px 12px;color:#7c6030;font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);}
#mute-btn:hover{background:rgba(255,255,255,0.8);}
#prompt-area{
  position:relative;z-index:10;
  display:flex;align-items:center;gap:14px;margin:10px 0 6px;
}
#speak-btn{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.6);border:1.5px solid rgba(160,180,220,0.5);
  border-radius:40px;padding:8px 20px;cursor:pointer;
  color:#4a6090;font-size:14px;font-weight:700;transition:background 0.15s;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
#speak-btn:hover{background:rgba(255,255,255,0.85);}
#speak-btn.speaking{background:rgba(251,191,36,0.2);border-color:#f59e0b;color:#b45309;}
.wave-bars{display:flex;align-items:flex-end;gap:3px;height:18px;}
.wb{width:4px;background:#34d399;border-radius:2px;opacity:0;}
#speak-btn.speaking .wb{opacity:1;animation:waveBounce 0.5s ease-in-out infinite alternate;}
.wb:nth-child(1){height:6px;animation-delay:0s;}
.wb:nth-child(2){height:12px;animation-delay:0.1s;}
.wb:nth-child(3){height:18px;animation-delay:0.2s;}
.wb:nth-child(4){height:12px;animation-delay:0.3s;}
.wb:nth-child(5){height:6px;animation-delay:0.4s;}
@keyframes waveBounce{0%{transform:scaleY(0.4);}100%{transform:scaleY(1.2);}}
#round-info{font-size:13px;color:rgba(90,70,40,0.6);}
#card-grid{
  position:relative;z-index:10;
  display:flex;gap:24px;align-items:center;justify-content:center;
  flex-shrink:0;padding:0 16px;
}
.card{
  position:relative;cursor:pointer;border-radius:20px;overflow:hidden;
  border:3.5px solid rgba(200,185,155,0.5);
  background:rgba(255,255,255,0.55);
  box-shadow:0 6px 20px rgba(0,0,0,0.10);
  transition:transform 0.13s,border-color 0.2s,box-shadow 0.2s;flex-shrink:0;
}
.card:hover{transform:scale(1.05);border-color:rgba(100,160,220,0.6);
  box-shadow:0 10px 28px rgba(0,0,0,0.14);}
.card:active{transform:scale(0.97);}
.card img{display:block;width:100%;height:100%;object-fit:cover;border-radius:16px;pointer-events:none;}
.card.disabled{pointer-events:none;}
.card.correct{border-color:#22c55e;
  box-shadow:0 0 0 3px #22c55e,0 0 28px rgba(34,197,94,0.55);
  animation:correctPop 0.38s ease-out;}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.card.wrong{border-color:#ef4444;
  box-shadow:0 0 0 3px #ef4444,0 0 22px rgba(239,68,68,0.5);
  animation:wrongShake 0.4s ease-out;}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}60%{transform:translateX(9px)}}
.card.reveal{border-color:#22c55e;
  box-shadow:0 0 0 3px #22c55e,0 0 28px rgba(34,197,94,0.6);
  animation:revealPulse 0.6s ease-out;}
@keyframes revealPulse{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.card.dimmed{opacity:0.25;filter:grayscale(70%);pointer-events:none;}
.badge{
  position:absolute;top:8px;right:8px;
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;
  opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:5;
}
.card.correct .badge,.card.wrong .badge,.card.reveal .badge{opacity:1;}
.card.correct .badge{background:#22c55e;color:#fff;}
.card.wrong .badge{background:#ef4444;color:#fff;}
.card.reveal .badge{background:#22c55e;color:#fff;}
#result-msg{
  position:relative;z-index:10;margin-top:10px;
  font-size:15px;font-weight:700;color:transparent;
  text-align:center;min-height:24px;transition:color 0.3s;
}
#result-msg.ok{color:#16a34a;}
#result-msg.err{color:#dc2626;}
#next-btn{
  position:relative;z-index:10;margin-top:8px;
  padding:10px 32px;border-radius:50px;border:none;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  color:#fff;font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 14px rgba(245,158,11,0.4);
  transition:transform 0.12s,opacity 0.2s;opacity:0;pointer-events:none;
}
#next-btn.show{opacity:1;pointer-events:auto;}
#next-btn:hover{transform:translateY(-2px);}
.overlay{
  position:absolute;inset:0;z-index:100;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  background:rgba(200,230,250,0.88);backdrop-filter:blur(12px);
}
.overlay.show{display:flex;}
.ov-icon{font-size:60px;line-height:1;}
.ov-h2{font-size:28px;font-weight:900;color:#5a3a00;text-align:center;}
.ov-p{font-size:15px;color:rgba(60,50,30,0.82);text-align:center;line-height:1.8;max-width:340px;}
.ov-btn{padding:12px 38px;border-radius:50px;border:none;
  font-size:16px;font-weight:800;cursor:pointer;transition:transform 0.12s;}
.ov-btn:hover{transform:translateY(-2px);}
.btn-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;
  box-shadow:0 4px 16px rgba(245,158,11,0.45);}
.score-row{display:flex;gap:16px;}
.sc-chip{padding:10px 20px;border-radius:14px;text-align:center;
  background:rgba(255,255,255,0.6);border:1.5px solid rgba(200,185,140,0.4);
  box-shadow:0 2px 8px rgba(0,0,0,0.07);}
.sc-num{font-size:30px;font-weight:900;color:#16a34a;}
.sc-lbl{font-size:12px;color:rgba(80,60,30,0.6);margin-top:2px;}
.cp{position:absolute;pointer-events:none;z-index:90;animation:cpFall linear forwards;}
@keyframes cpFall{0%{opacity:1;transform:translateY(-20px) rotate(0);}
  100%{opacity:0;transform:translateY(110%) rotate(580deg);}}
.ripple{position:absolute;border-radius:50%;pointer-events:none;z-index:80;
  animation:ripOut 0.55s ease-out forwards;}
@keyframes ripOut{from{transform:scale(0);opacity:1;}to{transform:scale(6);opacity:0;}}
#rotate-hint{
  display:none;position:absolute;inset:0;z-index:200;
  background:rgba(200,230,250,0.96);flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  color:#5a3a00;font-size:18px;font-weight:700;text-align:center;
}
.rh-icon{font-size:54px;animation:rotHint 2s infinite;}
@keyframes rotHint{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media(orientation:portrait) and (max-width:700px){#rotate-hint{display:flex;}}
</style>

<style>
#_scale_outer{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#1a1a1a;
}
#_scale_inner{
  position:relative;
  width:960px;height:540px;
  transform-origin:top left;
  flex-shrink:0;overflow:hidden;
}
</style>
<script>
(function(){
  var DW=960,DH=540;
  function doScale(){
    var el=document.getElementById('_scale_inner');
    if(!el)return;
    var vw=window.innerWidth,vh=window.innerHeight;
    var s=Math.min(vw/DW,vh/DH);
    var sl=Math.max(0,(vw-DW*s)/2);
    var st=Math.max(0,(vh-DH*s)/2);
    el.style.transform='scale('+s+')';
    el.style.position='absolute';
    el.style.left=sl+'px';
    el.style.top=st+'px';
    document.getElementById('_scale_outer').style.background='#1a1a1a';
  }
  function init(){
    var target=document.querySelector('#app');
    if(!target)return;
    var outer=document.createElement('div');
    outer.id='_scale_outer';
    var inner=document.createElement('div');
    inner.id='_scale_inner';
    document.body.insertBefore(outer,document.body.firstChild);
    outer.appendChild(inner);
    inner.appendChild(target);
    doScale();
  }
  window.addEventListener('DOMContentLoaded',init);
  window.addEventListener('resize',doScale);
  window.addEventListener('orientationchange',function(){setTimeout(doScale,300);});
})();
</script>

</head>

<div id="app">
  <div id="stars"></div>
  <div id="rotate-hint"><div class="rh-icon">&#128241;</div><div>&#35831;&#26222;&#23631;&#28216;&#29988;<br>Please rotate</div></div>
  <div id="top-bar">
    <div id="score-box">&#127881; <span id="score">0</span></div>
    <div id="timer-wrap">
      <div id="timer-bar-bg"><div id="timer-bar"></div></div>
      <div id="timer-txt">10s</div>
    </div>
    <button id="mute-btn" onclick="toggleMute()">&#128266;</button>
  </div>
  <div id="prompt-area">
    <button id="speak-btn" onclick="replayWord()">
      <div class="wave-bars">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div>
        <div class="wb"></div><div class="wb"></div>
      </div>
    </button>
    <div id="round-info">Round <span id="round-num">1</span> / 3</div>
  </div>
  <div id="card-grid"></div>
  <div id="result-msg"></div>
  <button id="next-btn" onclick="nextRound()">&#19979;&#19968;&#39064; &#8594;</button>

  <div class="overlay show" id="start-overlay">
    <div class="ov-icon">&#128017;&#128016;&#128014;</div>
    <div class="ov-h2">Listen &amp; Click</div>
    <div class="ov-p">
      听音频选出对应的单词<br>
      在 <strong style="color:#059669">10 秒</strong> 内点击正确图片！<br><br>
      <strong style="color:#d97706">积分规则：</strong><br>
      🐴 horse: 20分 | 🐮 cow: 10分 | 🫏 donkey: 30分<br>
      共 <strong style="color:#d97706">3 轮</strong>，每轮随机出题
    </div>
    <button class="ov-btn btn-gold" onclick="startGame()">&#24320;&#22987;&#28216;&#25103; &#9658;</button>
  </div>

  <div class="overlay" id="done-overlay">
    <div class="ov-icon" id="done-icon">&#127942;</div>
    <div class="ov-h2" id="done-title">&#28216;&#25103;&#32467;&#26675;&#65281;</div>
    <div class="score-row">
      <div class="sc-chip"><div class="sc-num" id="done-correct">0</div><div class="sc-lbl">&#31572;&#23545;</div></div>
      <div class="sc-chip"><div class="sc-num" style="color:#d97706">3</div><div class="sc-lbl">&#20849;3&#36650;</div></div>
      <div class="sc-chip"><div class="sc-num" id="done-score" style="color:#d97706">0</div><div class="sc-lbl">最终得分</div></div>
    </div>
    <div class="ov-p" id="done-msg"></div>
    <button class="ov-btn btn-gold" onclick="restartGame()">&#20877;&#29609;&#19968;&#27425; &#8635;</button>
  </div>
</div>

var ANIMALS = ['cow','donkey','horse'];
var ROUND_SEQUENCE = ['horse','cow','donkey'];
var TOTAL_ROUNDS = 3, ROUND_TIME = 10;
var roundIdx=0, score=0, correct=0;
var muted=false, answered=false;
var timerIv=null, timeLeft=ROUND_TIME, targetWord='';
var audioCtx=null;

function initAudio(){
  if(audioCtx) return;
  try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
}

function playSFX(type){
  if(!audioCtx||muted) return;
  var ctx=audioCtx;
  if(type==='correct'){
    [660,880,1100].forEach(function(f,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      var t=ctx.currentTime+i*0.09;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t);o.stop(t+0.28);
    });
  } else {
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(260,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+0.3);
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.32);
    o.start();o.stop(ctx.currentTime+0.32);
  }
}

function speak(word){
  if(muted||!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word);
  var vv=speechSynthesis.getVoices(),v=null;
  for(var i=0;i<vv.length;i++){if(vv[i].lang==='en-US'){v=vv[i];break;}}
  if(!v) for(var i=0;i<vv.length;i++){if(vv[i].lang.indexOf('en')===0){v=vv[i];break;}}
  if(v) u.voice=v;
  u.lang='en-US';u.rate=0.82;u.pitch=1.05;
  var btn=document.getElementById('speak-btn');
  btn.classList.add('speaking');
  u.onend=u.onerror=function(){btn.classList.remove('speaking');};
  setTimeout(function(){speechSynthesis.speak(u);},80);
}

function replayWord(){if(!answered) speak(targetWord);}

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'[mute]':'[sound]';
  if(muted&&'speechSynthesis' in window) speechSynthesis.cancel();
}

// Stars
(function(){
  var c=document.getElementById('stars');
  for(var i=0;i<50;i++){
    var s=document.createElement('div');s.className='star';
    var sz=1+Math.random()*2;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;animation:twinkle '+(2+Math.random()*3)+'s '+(Math.random()*3)+'s infinite';
    c.appendChild(s);
  }
})();

function cardSize(){
  var vw=window.innerWidth,vh=window.innerHeight;
  return Math.max(Math.floor(Math.min((vw-180)/3,230,vh*0.52,250)),110);
}

function buildCards(){
  var grid=document.getElementById('card-grid');
  grid.innerHTML='';
  var sz=cardSize();
  var order=ANIMALS.slice().sort(function(){return Math.random()-0.5;});
  order.forEach(function(name){
    var card=document.createElement('div');
    card.className='card';card.id='card-'+name;card.dataset.animal=name;
    card.style.width=sz+'px';card.style.height=sz+'px';
    var img=document.createElement('img');img.src=IMGS[name];img.alt=name;
    var badge=document.createElement('div');badge.className='badge';badge.id='badge-'+name;
    card.appendChild(img);card.appendChild(badge);
    (function(n,c){card.addEventListener('click',function(){onCardClick(n,c);});})(name,card);
    grid.appendChild(card);
  });
}

function startTimer(){
  timeLeft=ROUND_TIME;updateTimerUI();clearInterval(timerIv);
  timerIv=setInterval(function(){timeLeft--;updateTimerUI();if(timeLeft<=0){clearInterval(timerIv);onTimeout();}},1000);
}

function updateTimerUI(){
  var pct=timeLeft/ROUND_TIME;
  var bar=document.getElementById('timer-bar');
  bar.style.width=(pct*100)+'%';
  bar.style.background=pct>0.5?'linear-gradient(90deg,#4ade80,#22d3ee)':
    pct>0.25?'linear-gradient(90deg,#facc15,#fb923c)':'linear-gradient(90deg,#ef4444,#dc2626)';
  document.getElementById('timer-txt').textContent=timeLeft+'s';
}

function spawnRipple(card,ok){
  var rect=card.getBoundingClientRect();
  var ar=document.getElementById('app').getBoundingClientRect();
  var r=document.createElement('div');r.className='ripple';
  r.style.cssText='width:60px;height:60px;left:'+(rect.left-ar.left+rect.width/2-30)+'px;top:'+(rect.top-ar.top+rect.height/2-30)+'px;background:'+(ok?'rgba(34,197,94,0.35)':'rgba(239,68,68,0.35)');
  document.getElementById('app').appendChild(r);
  setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},600);
}

function onCardClick(name,card){
  if(answered) return;
  answered=true;clearInterval(timerIv);
  document.querySelectorAll('.card').forEach(function(c){c.classList.add('disabled');});
  if(name===targetWord){
    card.classList.add('correct');
    document.getElementById('badge-'+name).textContent='OK';
    playSFX('correct');
    var ptsMap = { 'donkey': 30, 'cow': 10, 'horse': 20 };
    var pts = ptsMap[name] || 0;
    score += pts;
    document.getElementById('score').textContent=score;
    correct++;
    showResult('Correct! +' + pts + ' pts','ok');
    spawnRipple(card,true);
    // Auto-advance after a short celebration
    setTimeout(function(){
      if(roundIdx+1<TOTAL_ROUNDS){ nextRound(); } else { showDone(); }
    },1400);
  } else {
    card.classList.add('wrong');
    document.getElementById('badge-'+name).textContent='X';
    playSFX('wrong');
    showResult('Wrong! The correct answer is ' + targetWord + '.','err');
    spawnRipple(card,false);
    setTimeout(function(){
      var cc=document.getElementById('card-'+targetWord);
      if(cc){cc.classList.remove('disabled');cc.classList.add('reveal');document.getElementById('badge-'+targetWord).textContent='!';}
      card.classList.add('dimmed');
    },500);
    // Auto-advance after the student has had time to see the correct answer
    setTimeout(function(){
      if(roundIdx+1<TOTAL_ROUNDS){ nextRound(); } else { showDone(); }
    },2400);
  }
}

function onTimeout(){
  if(answered) return;
  answered=true;
  document.querySelectorAll('.card').forEach(function(c){c.classList.add('disabled');});
  playSFX('wrong');
  showResult("Time's up! The correct answer is " + targetWord + ".",'err');
  setTimeout(function(){
    var cc=document.getElementById('card-'+targetWord);
    if(cc){cc.classList.remove('disabled');cc.classList.add('reveal');document.getElementById('badge-'+targetWord).textContent='!';}
    document.querySelectorAll('.card').forEach(function(c){if(c.dataset.animal!==targetWord) c.classList.add('dimmed');});
  },400);
  // Auto-advance after the student has had time to see the correct answer
  setTimeout(function(){
    if(roundIdx+1<TOTAL_ROUNDS){ nextRound(); } else { showDone(); }
  },2400);
}

function showResult(msg,type){
  var el=document.getElementById('result-msg');
  el.textContent=msg;el.className=type;
}

function setupRound(){
  answered=false;
  targetWord=ROUND_SEQUENCE[roundIdx];
  document.getElementById('round-num').textContent=roundIdx+1;
  buildCards();updateTimerUI();
  document.getElementById('result-msg').className='';
  document.getElementById('result-msg').textContent='';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('score').textContent=score;
  setTimeout(function(){speak(targetWord);},500);
  startTimer();
}

function nextRound(){
  roundIdx++;
  if(roundIdx>=TOTAL_ROUNDS){showDone();return;}
  setupRound();
}

function showDone(){
  clearInterval(timerIv);
  document.getElementById('done-correct').textContent=correct;
  document.getElementById('done-score').textContent=score;
  var msgs=['Keep trying!','Good job!','Great!','Excellent!','Perfect!'];
  document.getElementById('done-msg').textContent=msgs[Math.min(correct,4)];
  document.getElementById('done-title').textContent=correct===TOTAL_ROUNDS?'Perfect Score!':'Game Over!';
  document.getElementById('done-icon').textContent=correct>=4?'🏆':correct>=2?'⭐':'💪';
  document.getElementById('done-overlay').classList.add('show');
  if(correct>=3) spawnConfetti();
}

function spawnConfetti(){
  var cols=['#FFD700','#22c55e','#60a5fa','#f472b6','#fb923c','#a78bfa','#fff','#34d399'];
  var app=document.getElementById('app');
  for(var i=0;i<80;i++){
    (function(idx){
      var c=document.createElement('div');c.className='cp';
      var sz=5+Math.random()*9;
      c.style.left=(Math.random()*100)+'%';c.style.top='-20px';
      c.style.width=sz+'px';c.style.height=(sz*1.4)+'px';
      c.style.background=cols[idx%cols.length];
      c.style.borderRadius=Math.random()>0.5?'50%':'3px';
      c.style.animationDuration=(1.5+Math.random()*2.2)+'s';
      c.style.animationDelay=(Math.random()*0.9)+'s';
      app.appendChild(c);
      setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},4500);
    })(i);
  }
}

function startGame(){
  initAudio();
  if('speechSynthesis' in window){var w=new SpeechSynthesisUtterance(' ');w.volume=0;speechSynthesis.speak(w);}
  document.getElementById('start-overlay').classList.remove('show');
  roundIdx=0;score=0;correct=0;
  setupRound();
}

function restartGame(){
  document.getElementById('done-overlay').classList.remove('show');
  roundIdx=0;score=0;correct=0;
  setupRound();
}

if('speechSynthesis' in window){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};
}

</script>
</body>
</html>
