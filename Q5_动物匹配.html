<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Match the Animals</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:"Nunito","PingFang SC","Microsoft YaHei",sans-serif;}

#app{position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;overflow:hidden;}


/* ── SCORE POPUP ── */
.score-popup{
  position:absolute;pointer-events:none;z-index:50;
  font-size:18px;font-weight:900;color:#FFD700;
  text-shadow:0 1px 6px rgba(0,0,0,.6);
  animation:scoreFloat 1s ease-out forwards;
}
@keyframes scoreFloat{
  0%{opacity:1;transform:translateY(0) scale(1);}
  60%{opacity:1;transform:translateY(-40px) scale(1.2);}
  100%{opacity:0;transform:translateY(-70px) scale(0.9);}
}

/* ── FARM BACKGROUND ── */
#farm-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
.sky{position:absolute;top:0;left:0;right:0;height:52%;
  background:linear-gradient(180deg,#87ceeb 0%,#c8ecf8 100%);}
.sun{position:absolute;top:14px;right:52px;width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle,#ffe135 55%,#ffb800 100%);
  box-shadow:0 0 0 10px rgba(255,225,50,.18),0 0 0 22px rgba(255,225,50,.08);}
.cloud{position:absolute;background:rgba(255,255,255,.88);border-radius:50px;}
.hill{position:absolute;border-radius:50%;}
.ground{position:absolute;bottom:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,#7ec850 0%,#5aaa30 100%);}
.fence-wrap{position:absolute;bottom:48%;left:0;right:0;height:24px;display:flex;align-items:flex-end;}
.fp{width:9px;height:24px;background:#c8914a;border-radius:3px 3px 0 0;margin-right:20px;flex-shrink:0;}
.fr{position:absolute;bottom:6px;left:0;right:0;height:5px;background:#d9a05a;border-radius:2px;}
.fr2{position:absolute;bottom:15px;left:0;right:0;height:5px;background:#d9a05a;border-radius:2px;}
.barn{position:absolute;right:3%;bottom:48%;}
.barn-body{position:absolute;bottom:0;left:10px;right:10px;height:46px;background:#c0392b;}
.barn-roof{position:absolute;bottom:42px;left:0;right:0;width:0;height:0;
  border-left:46px solid transparent;border-right:46px solid transparent;border-bottom:26px solid #8b2020;}
.barn-door{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:18px;height:24px;background:#7a4a1a;border-radius:3px 3px 0 0;}
.tree{position:absolute;}
.tt{width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;
  border-bottom:30px solid #2e7d32;margin-bottom:-6px;}
.tt2{width:0;height:0;border-left:24px solid transparent;border-right:24px solid transparent;
  border-bottom:26px solid #388e3c;}
.ttr{width:9px;height:18px;background:#8b5c2a;border-radius:2px;margin:0 auto;}
.fl{position:absolute;font-size:12px;}
.gt{position:absolute;color:#4caf50;font-size:14px;}

/* ── HUD ── */
#hud{position:relative;z-index:10;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px 2px;flex-shrink:0;}
#title-lbl{font-size:14px;font-weight:900;color:#fff;
  text-shadow:0 1px 5px rgba(0,0,0,.55);letter-spacing:.03em;}
#score-box{font-size:13px;font-weight:800;color:#fff;
  background:rgba(34,197,94,.25);border:1.5px solid rgba(34,197,94,.5);
  border-radius:20px;padding:2px 10px;}
#timer-wrap{flex:1;margin:0 10px;display:flex;flex-direction:column;align-items:center;gap:2px;}
#timer-bar-bg{width:100%;height:8px;background:rgba(0,0,0,.2);border-radius:4px;overflow:hidden;
  border:1px solid rgba(255,255,255,.2);}
#timer-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#4ade80,#22d3ee);
  width:100%;transition:width .4s linear,background .5s;}
#timer-txt{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);}
#mute-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  border-radius:7px;padding:2px 9px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}

/* ── GAME AREA ── */
#game-area{
  position:relative;z-index:10;flex:1;width:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:4px 14px 6px;overflow:hidden;
  gap:0;
}

/* SVG for lines — absolute over whole game-area */
#svg-canvas{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  width:100%;height:100%;
}

/* Top row: 7 image cards */
#img-row{
  position:relative;z-index:10;
  display:flex;justify-content:center;align-items:flex-end;
  gap:clamp(8px,1.5vw,16px);
  width:100%;
  flex-shrink:0;
}

/* Middle gap for lines */
#line-gap{
  flex:0 0 clamp(44px,9vh,72px);
  width:100%;
}

/* Bottom row: 7 word cards */
#word-row{
  position:relative;z-index:10;
  display:flex;justify-content:center;align-items:flex-start;
  gap:clamp(8px,1.5vw,16px);
  width:100%;
  flex-shrink:0;
}

/* ── IMAGE CARDS — strict 1:1 square ── */
.img-card{
  position:relative;
  /* width is the limiting dimension; height = width via padding trick */
  flex:0 0 auto;
  /* each card takes 1/5 of row width minus gaps */
  width:calc((100% - 4 * clamp(8px,1.5vw,16px)) / 5);
  max-width:130px;
  border-radius:10px;overflow:hidden;
  border:3px solid rgba(255,255,255,.28);cursor:pointer;
  transition:border-color .18s,box-shadow .18s,transform .12s;
  background:#222;
  box-shadow:0 3px 10px rgba(0,0,0,.4);
}
/* padding-top trick for 1:1 */
.img-card-inner{
  position:relative;
  width:100%;
  padding-top:100%;
}
.img-card img{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
  border-radius:7px;pointer-events:none;
}
.img-card:hover{transform:scale(1.07);border-color:rgba(255,255,255,.65);}
.img-card.selected{border-color:#FFD700;box-shadow:0 0 0 3px #FFD700,0 0 16px rgba(255,215,0,.7);}
.img-card.matched{border-color:#22c55e;box-shadow:0 0 0 2px #22c55e,0 0 14px rgba(34,197,94,.6);cursor:default;}
.img-card.wrong-anim{animation:noConn .5s ease-out;}
@keyframes noConn{
  0%{transform:translateY(0);border-color:#ef4444;box-shadow:0 0 0 3px #ef4444;}
  20%{transform:translateY(-6px);}40%{transform:translateY(6px);}
  60%{transform:translateY(-4px);}80%{transform:translateY(4px);}
  100%{transform:translateY(0);border-color:rgba(255,255,255,.28);box-shadow:0 3px 10px rgba(0,0,0,.4);}
}
.check-badge{
  position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;
  background:#22c55e;display:none;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:900;z-index:6;
}
.img-card.matched .check-badge{display:flex;}

/* ── WORD CARDS ── */
.word-card{
  flex:0 0 auto;
  width:calc((100% - 4 * clamp(8px,1.5vw,16px)) / 5);
  max-width:130px;
  border-radius:9px;
  background:#1b4332;
  border:2px solid #2d6a4f;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  padding:6px 3px;
  aspect-ratio:1;          /* keep them square too */
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  transition:border-color .18s,box-shadow .18s,transform .12s,background .18s;
}
.word-card span{
  font-size:clamp(16px,2vw,24px);
  font-weight:900;color:#fff;
  text-align:center;pointer-events:none;
  letter-spacing:.03em;
  overflow-wrap:break-word;word-break:break-all;
  line-height:1.15;
}
.word-card:hover{transform:scale(1.07);border-color:#52b788;background:#2d6a4f;}
.word-card.selected{border-color:#FFD700;background:#3d5a12;
  box-shadow:0 0 0 2px #FFD700,0 0 12px rgba(255,215,0,.6);}
.word-card.matched{border-color:#22c55e;background:#1a4a2e;
  box-shadow:0 0 0 2px #22c55e;cursor:default;}
.word-card.matched span{color:#86efac;}
.word-card.wrong-anim{animation:noConn .5s ease-out;}

/* ── OVERLAYS ── */
.overlay{position:absolute;inset:0;z-index:100;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:rgba(8,28,8,.91);backdrop-filter:blur(10px);}
.overlay.show{display:flex;}
.ov-icon{font-size:54px;line-height:1;}
.ov-h2{font-size:24px;font-weight:900;color:#FFD700;text-align:center;}
.ov-p{font-size:14px;color:rgba(255,255,255,.82);text-align:center;line-height:1.7;max-width:340px;}
.chips{display:flex;gap:14px;}
.chip{padding:10px 18px;border-radius:12px;text-align:center;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);}
.chip-num{font-size:28px;font-weight:900;color:#4ade80;}
.chip-lbl{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.ov-btn{padding:10px 32px;border-radius:50px;border:none;font-size:14px;font-weight:800;
  cursor:pointer;transition:transform .12s;}
.ov-btn:hover{transform:translateY(-2px);}
.btn-gold{background:linear-gradient(135deg,#FFD700,#f59e0b);color:#1a1a1a;
  box-shadow:0 4px 14px rgba(255,215,0,.35);}

.cp{position:absolute;pointer-events:none;z-index:90;animation:cpFall linear forwards;}
@keyframes cpFall{0%{opacity:1;transform:translateY(-10px) rotate(0);}
  100%{opacity:0;transform:translateY(110%) rotate(560deg);}}

#rotate-hint{display:none;position:absolute;inset:0;z-index:200;
  background:#1a3a0a;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:#fff;font-size:17px;font-weight:700;text-align:center;}
.rh-icon{font-size:52px;animation:rotH 2s infinite;}
@keyframes rotH{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media(orientation:portrait) and (max-width:700px){#rotate-hint{display:flex;}}
</style>
</head>

var selectedImg=null,selectedWord=null;
var matchLines=[],muted=false,audioCtx=null,bgmSched=false;

function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function note(f,t,dur,type,vol,dest){
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(dest||audioCtx.destination);
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.2,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}
function drum(t,type,dest){
  if(!audioCtx)return;
  if(type==='kick'){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(dest||audioCtx.destination);
    o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+0.12);
    g.gain.setValueAtTime(0.38,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.start(t);o.stop(t+0.2);
  }else if(type==='snare'){
    var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.12,audioCtx.sampleRate);
    var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    var src=audioCtx.createBufferSource(),fl=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;fl.type='bandpass';fl.frequency.value=1600;fl.Q.value=0.7;
    src.connect(fl);fl.connect(g);g.connect(dest||audioCtx.destination);
    g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    src.start(t);src.stop(t+0.14);
  }else if(type==='hat'){
    var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.04,audioCtx.sampleRate);
    var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    var src=audioCtx.createBufferSource(),fl=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;fl.type='highpass';fl.frequency.value=9000;
    src.connect(fl);fl.connect(g);g.connect(dest||audioCtx.destination);
    g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    src.start(t);src.stop(t+0.05);
  }
}
function makeBGMLoop(s){
  if(!audioCtx||muted)return;
  var ctx=audioCtx;
  // Master gain — soft volume
  var master=ctx.createGain();
  master.gain.value=0.22;
  master.connect(ctx.destination);

  // Slow waltz: BPM=76, 3/4
  var beat=60/76, bar=beat*3, BARS=16;

  // C major scale freqs: C4 D4 E4 F4 G4 A4 B4 C5 D5 E5
  var S=[261.6,293.7,329.6,349.2,392,440,493.9,523.3,587.3,659.3];

  // Melody: gentle stepwise phrases (index into S)
  var MEL=[4,5,6,7,6,5,4,2, 3,4,5,6,5,4,3,1,
           2,4,6,7,6,4,2,0, 1,3,5,6,5,3,4,5];

  // Bass root per bar (C G F G pattern, 2-bar cycle repeated)
  var BASS=[S[0],S[4],S[3],S[4], S[0],S[4],S[5],S[4],
            S[0],S[2],S[3],S[4], S[0],S[4],S[3],S[4]];

  // Chord sets per bar [root, third, fifth]
  var CHD=[
    [S[0],S[2],S[4]], [S[4],S[6],S[1]], [S[3],S[5],S[0]], [S[4],S[6],S[1]],
    [S[0],S[2],S[4]], [S[4],S[6],S[1]], [S[5],S[0],S[3]], [S[4],S[6],S[1]],
    [S[0],S[2],S[4]], [S[2],S[4],S[6]], [S[3],S[5],S[0]], [S[4],S[6],S[1]],
    [S[0],S[2],S[4]], [S[4],S[6],S[1]], [S[3],S[5],S[0]], [S[0],S[2],S[4]]
  ];

  function nt(freq,t,dur,type,vol){
    if(freq<=0)return;
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type||'sine';
    o.frequency.value=freq;
    o.connect(g);g.connect(master);
    var att=0.02,rel=Math.min(0.18,dur*0.35);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+att);
    g.gain.setValueAtTime(vol,t+dur-rel);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t);o.stop(t+dur+0.01);
  }

  for(var b=0;b<BARS;b++){
    var bt=s+b*bar;
    var ch=CHD[b%CHD.length];

    // Beat 1: bass note (low, sine, warm)
    nt(BASS[b%BASS.length]*0.5, bt, beat*0.7, 'sine', 0.18);
    // Beat 1: chord stab (triangle, soft)
    nt(ch[0], bt+0.01, beat*0.55, 'triangle', 0.06);
    nt(ch[1], bt+0.03, beat*0.50, 'triangle', 0.05);
    nt(ch[2], bt+0.05, beat*0.45, 'triangle', 0.04);

    // Beat 2: mid chord (lighter)
    nt(ch[1], bt+beat, beat*0.4, 'triangle', 0.045);
    nt(ch[2], bt+beat+0.02, beat*0.38, 'triangle', 0.038);

    // Beat 3: lightest chord
    nt(ch[0], bt+beat*2, beat*0.35, 'triangle', 0.035);
    nt(ch[2], bt+beat*2+0.02, beat*0.32, 'triangle', 0.03);

    // Melody: one note per bar, sine wave, sits on top
    var mi=MEL[b%MEL.length];
    nt(S[mi], bt+beat*0.08, beat*1.6, 'sine', 0.09);

    // Every 4 bars: soft high chime for sparkle
    if(b%4===0){
      nt(S[7]*2, bt+beat*0.5, beat*1.8, 'sine', 0.028);
    }
  }

  var next=s+BARS*bar;
  setTimeout(function(){
    bgmSched=false;
    if(!muted&&gameRunning)scheduleBGM_at(next);
  }, Math.max((next-ctx.currentTime-0.5)*1000,100));
}
function scheduleBGM_at(t){if(bgmSched||!audioCtx||muted||!gameRunning)return;bgmSched=true;makeBGMLoop(t);}
function startBGM(){bgmSched=false;scheduleBGM_at(audioCtx.currentTime+0.05);}


function showScorePopup(card,pts){
  var rect=card.getBoundingClientRect();
  var app=document.getElementById('app');
  var ar=app.getBoundingClientRect();
  var pop=document.createElement('div');
  pop.className='score-popup';
  pop.textContent='+'+pts;
  pop.style.left=(rect.left-ar.left+rect.width/2-16)+'px';
  pop.style.top=(rect.top-ar.top-10)+'px';
  app.appendChild(pop);
  setTimeout(function(){if(pop.parentNode)pop.parentNode.removeChild(pop);},1000);
}

function playSFX_correct(){
  if(!audioCtx||muted)return;
  [660,880,1108].forEach(function(f,i){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=f;
    var t=audioCtx.currentTime+i*0.08;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.28,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start(t);o.stop(t+0.32);
  });
}
function playSFX_wrong(){
  if(!audioCtx||muted)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';
  o.frequency.setValueAtTime(280,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(90,audioCtx.currentTime+0.28);
  g.gain.setValueAtTime(0.28,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
  o.start();o.stop(audioCtx.currentTime+0.32);
}
function speak(word){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word),vv=speechSynthesis.getVoices(),v=null;
  for(var i=0;i<vv.length;i++){if(vv[i].lang==='en-US'){v=vv[i];break;}}
  if(!v)for(var i=0;i<vv.length;i++){if(vv[i].lang.indexOf('en')===0){v=vv[i];break;}}
  if(v)u.voice=v;u.lang='en-US';u.rate=0.85;u.pitch=1.05;
  setTimeout(function(){speechSynthesis.speak(u);},80);
}
function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'&#128264;':'&#128266;';
  if(muted&&'speechSynthesis' in window)speechSynthesis.cancel();
}

function shuffle(a){
  var arr=a.slice();
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}

function buildGame(){
  document.getElementById('img-row').innerHTML='';
  document.getElementById('word-row').innerHTML='';
  document.getElementById('svg-canvas').innerHTML='';
  matchLines=[];selectedImg=null;selectedWord=null;matchedCount=0;
  document.getElementById('score').textContent='0';matchedCount=0;totalScore=0;

  var imgOrder=shuffle(ANIMALS),wordOrder=shuffle(ANIMALS);
  for(var tries=0;tries<30;tries++){
    var same=0;for(var i=0;i<imgOrder.length;i++)if(imgOrder[i]===wordOrder[i])same++;
    if(same<=2)break;
    wordOrder=shuffle(ANIMALS);
  }

  imgOrder.forEach(function(name){
    var card=document.createElement('div');
    card.className='img-card';card.id='ic-'+name;card.dataset.animal=name;
    card.innerHTML='<div class="img-card-inner"><img src="'+IMGMAP[name]+'" alt="'+name+'"></div><div class="check-badge">&#10003;</div>';
    (function(n,c){card.addEventListener('click',function(){onImgClick(n,c);});})(name,card);
    document.getElementById('img-row').appendChild(card);
  });

  wordOrder.forEach(function(name){
    var card=document.createElement('div');
    card.className='word-card';card.id='wc-'+name;card.dataset.animal=name;
    card.innerHTML='<span>'+name+'</span>';
    (function(n,c){card.addEventListener('click',function(){onWordClick(n,c);});})(name,card);
    document.getElementById('word-row').appendChild(card);
  });
}

function onImgClick(name,card){
  if(!gameRunning||card.classList.contains('matched'))return;
  if(selectedImg&&selectedImg.card===card){card.classList.remove('selected');selectedImg=null;return;}
  if(selectedImg)selectedImg.card.classList.remove('selected');
  selectedImg={name:name,card:card};card.classList.add('selected');
  if(selectedWord)tryMatch();
}
function onWordClick(name,card){
  if(!gameRunning||card.classList.contains('matched'))return;
  if(selectedWord&&selectedWord.card===card){card.classList.remove('selected');selectedWord=null;return;}
  if(selectedWord)selectedWord.card.classList.remove('selected');
  selectedWord={name:name,card:card};card.classList.add('selected');
  if(selectedImg)tryMatch();
}
function tryMatch(){
  var si=selectedImg,sw=selectedWord;
  selectedImg=null;selectedWord=null;
  si.card.classList.remove('selected');sw.card.classList.remove('selected');
  if(si.name===sw.name){
    si.card.classList.add('matched');sw.card.classList.add('matched');
    drawMatchLine(si.card,sw.card);playSFX_correct();speak(si.name);
    matchedCount++;
    var pts=SCORE_MAP[si.name]||10;
    totalScore+=pts;
    document.getElementById('score').textContent=totalScore;
    showScorePopup(si.card,pts);
    if(matchedCount===ANIMALS.length)setTimeout(showDone,500);
  }else{
    si.card.classList.add('wrong-anim');sw.card.classList.add('wrong-anim');
    playSFX_wrong();drawTempLine(si.card,sw.card);
    setTimeout(function(){si.card.classList.remove('wrong-anim');sw.card.classList.remove('wrong-anim');},520);
  }
}

function getCenter(el){
  var r=el.getBoundingClientRect();
  var ar=document.getElementById('svg-canvas').getBoundingClientRect();
  return {x:r.left-ar.left+r.width/2,y:r.top-ar.top+r.height/2};
}
function drawMatchLine(ic,wc){
  var svg=document.getElementById('svg-canvas'),p1=getCenter(ic),p2=getCenter(wc);
  var line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);
  line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
  line.setAttribute('stroke','#22c55e');line.setAttribute('stroke-width','3');
  line.setAttribute('stroke-linecap','round');line.setAttribute('opacity','0.9');
  svg.appendChild(line);matchLines.push({ic:ic,wc:wc,el:line});
}
function drawTempLine(ic,wc){
  var svg=document.getElementById('svg-canvas'),p1=getCenter(ic),p2=getCenter(wc);
  var line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);
  line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
  line.setAttribute('stroke','#ef4444');line.setAttribute('stroke-width','2.5');
  line.setAttribute('stroke-dasharray','5 4');line.setAttribute('opacity','0.75');
  svg.appendChild(line);
  setTimeout(function(){if(line.parentNode)line.parentNode.removeChild(line);},520);
}
function redrawLines(){
  var svg=document.getElementById('svg-canvas');
  matchLines.forEach(function(l){if(l.el.parentNode)svg.removeChild(l.el);});
  var old=matchLines.slice();matchLines=[];
  old.forEach(function(l){drawMatchLine(l.ic,l.wc);});
}
window.addEventListener('resize',function(){if(gameRunning)setTimeout(redrawLines,60);});

function startTimer(){
  timeLeft=TOTAL_TIME;updateTimerUI();clearInterval(timerIv);
  timerIv=setInterval(function(){timeLeft--;updateTimerUI();if(timeLeft<=0){clearInterval(timerIv);onTimeout();}},1000);
}
function updateTimerUI(){
  var pct=timeLeft/TOTAL_TIME,bar=document.getElementById('timer-bar');
  bar.style.width=(pct*100)+'%';
  bar.style.background=pct>0.5?'linear-gradient(90deg,#4ade80,#22d3ee)':
    pct>0.25?'linear-gradient(90deg,#facc15,#fb923c)':'linear-gradient(90deg,#ef4444,#dc2626)';
  document.getElementById('timer-txt').textContent=timeLeft+'s';
}
function onTimeout(){
  if(matchedCount>=ANIMALS.length)return;
  gameRunning=false;
  ANIMALS.forEach(function(name){
    var ic=document.getElementById('ic-'+name),wc=document.getElementById('wc-'+name);
    if(ic&&wc&&!ic.classList.contains('matched')){
      var svg=document.getElementById('svg-canvas'),p1=getCenter(ic),p2=getCenter(wc);
      var line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);
      line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
      line.setAttribute('stroke','#ef4444');line.setAttribute('stroke-width','2');
      line.setAttribute('stroke-dasharray','5 4');line.setAttribute('opacity','0.65');
      svg.appendChild(line);
    }
  });
  setTimeout(showDone,900);
}
function showDone(){
  gameRunning=false;clearInterval(timerIv);
  var used=TOTAL_TIME-Math.max(timeLeft,0);
  document.getElementById('done-score').textContent=totalScore+' pts';
  document.getElementById('done-time').textContent=used+'s';
  var icon,title,msg;
  if(matchedCount===5){icon='&#127942;';title='Perfect!';msg='全对！满分'+totalScore+'分！太棒了！';spawnConfetti(28);}
  else if(matchedCount>=4){icon='&#127775;';title='Well done!';msg='不错！得了'+totalScore+'分，再试一次？';spawnConfetti(12);}
  else if(matchedCount>=2){icon='&#128170;';title='Keep going!';msg='可以的！得了'+totalScore+'分，加油哦！';}
  else{icon='&#128517;';title='Try again!';msg='没关系，得了'+totalScore+'分，再试一次！';}
  document.getElementById('done-icon').innerHTML=icon;
  document.getElementById('done-title').textContent=title;
  document.getElementById('done-msg').innerHTML=msg;
  document.getElementById('done-overlay').classList.add('show');
}
function spawnConfetti(n){
  var cols=['#FFD700','#22c55e','#60a5fa','#f472b6','#fb923c','#a78bfa','#fff','#34d399'];
  var app=document.getElementById('app');
  for(var i=0;i<n;i++){
    (function(idx){
      var c=document.createElement('div');c.className='cp';var sz=5+Math.random()*10;
      c.style.left=(Math.random()*100)+'%';c.style.top='-15px';
      c.style.width=sz+'px';c.style.height=(sz*1.4)+'px';
      c.style.background=cols[idx%cols.length];c.style.borderRadius=Math.random()>.5?'50%':'3px';
      c.style.animationDuration=(1.6+Math.random()*2.4)+'s';c.style.animationDelay=(Math.random()*0.8)+'s';
      app.appendChild(c);setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},5000);
    })(i);
  }
}
function startGame(){
  initAudio();
  if('speechSynthesis' in window){
    speechSynthesis.getVoices();
    var w=new SpeechSynthesisUtterance(' ');w.volume=0;speechSynthesis.speak(w);
  }
  document.getElementById('start-overlay').classList.remove('show');
  buildGame();gameRunning=true;
  document.getElementById('timer-bar').style.transition='none';
  document.getElementById('timer-bar').style.width='100%';
  setTimeout(function(){document.getElementById('timer-bar').style.transition='width .4s linear,background .5s';},50);
  startTimer();startBGM();
}
function restartGame(){
  document.getElementById('done-overlay').classList.remove('show');
  buildGame();gameRunning=true;
  document.getElementById('timer-bar').style.transition='none';
  document.getElementById('timer-bar').style.width='100%';
  setTimeout(function(){document.getElementById('timer-bar').style.transition='width .4s linear,background .5s';},50);
  startTimer();bgmSched=false;startBGM();
}
if('speechSynthesis' in window){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};
}
</script>
