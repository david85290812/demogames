<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐑 Animal Fill-in</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Comic Sans MS', 'Chalkboard SE', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
  body { background: radial-gradient(ellipse at top, #b3e5fc 0%, #e1f5fe 40%, #fff3e0 70%, #ffe0b2 100%); position: relative; }
  .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.7; z-index: 0; }
  .cloud::before, .cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
  .cloud1 { top: 6%; left: 8%; width: 80px; height: 24px; }
  .cloud1::before { width: 35px; height: 35px; top: -16px; left: 10px; }
  .cloud1::after  { width: 45px; height: 45px; top: -20px; left: 30px; }
  .cloud2 { top: 14%; right: 10%; width: 100px; height: 28px; }
  .cloud2::before { width: 40px; height: 40px; top: -18px; left: 15px; }
  .cloud2::after  { width: 50px; height: 50px; top: -22px; left: 45px; }
  .stage { position: relative; width: 100%; height: 100%; display: flex; padding: 20px; gap: 24px; z-index: 1; }
  .image-panel { flex: 0 0 40%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .image-frame { width: 100%; height: 85%; max-width: 420px; max-height: 520px; background: white; border: 6px solid #795548; border-radius: 18px; padding: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.2); position: relative; }
  .image-frame::before { content:''; position:absolute; inset:4px; border: 2px dashed rgba(121,85,72,0.3); border-radius: 12px; pointer-events: none; }
  .image-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; pointer-events: none; }
  .image-caption { background: #ffca28; color: #5d4037; padding: 6px 18px; border-radius: 20px; font-weight: bold; font-size: 16px; border: 3px solid #8d6e63; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
  .round-indicator { display: flex; gap: 10px; }
  .round-dot { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.5); border: 2px solid #8d6e63; transition: background 0.3s; }
  .round-dot.done { background: #66bb6a; border-color: #2e7d32; }
  .round-dot.active { background: #ffca28; border-color: #f57c00; }
  .puzzle-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; padding: 10px; }
  .timer-row { display: flex; align-items: center; gap: 14px; background: white; padding: 10px 24px; border-radius: 40px; border: 4px solid #66bb6a; box-shadow: 0 6px 14px rgba(0,0,0,0.12); font-weight: 900; }
  .timer-icon { font-size: 26px; }
  .timer-val { font-size: 32px; color: #2e7d32; min-width: 50px; text-align: center; font-family: 'Courier New', monospace; }
  .timer-row.warning { border-color: #ef5350; animation: shake 0.3s infinite; }
  .timer-row.warning .timer-val { color: #d32f2f; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
  .sentence { display: flex; align-items: center; gap: 12px; font-size: 30px; font-weight: 700; color: #3e2723; flex-wrap: wrap; justify-content: center; text-align: center; line-height: 1.3; }
  .blank-row { display: inline-flex; gap: 8px; }
  .slot { width: 64px; height: 80px; border-radius: 12px; border: 3px dashed #8d6e63; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; font-size: 44px; font-weight: 900; color: #3e2723; cursor: pointer; transition: transform 0.15s, border-color 0.15s, background 0.2s; text-transform: lowercase; position: relative; }
  .slot.filled { border-style: solid; background: #fff59d; border-color: #f57c00; color: #3e2723; box-shadow: 0 4px 8px rgba(245,124,0,0.25); }
  .slot.filled:hover { transform: translateY(-2px); }
  .slot.correct { background: #a5d6a7; border-color: #2e7d32; color: #1b5e20; animation: correctPulse 0.6s ease-out; cursor: default; }
  .slot.wrong { animation: wrongShake 0.5s; background: #ef9a9a; border-color: #c62828; color: #b71c1c; }
  .slot.revealed { background: #bbdefb; border-color: #1565c0; color: #0d47a1; animation: revealPop 0.5s ease-out; cursor: default; }
  @keyframes correctPulse { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
  @keyframes wrongShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
  @keyframes revealPop { 0% { transform: scale(0.4) rotate(-15deg); opacity: 0; } 60% { transform: scale(1.15) rotate(5deg); } 100% { transform: scale(1) rotate(0); opacity: 1; } }
  .letter-tray { display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .letter-row { display: flex; gap: 12px; }
  .letter { width: 62px; height: 62px; border-radius: 14px; background: linear-gradient(145deg, #ffffff, #f0e6d2); border: 3px solid #a1887f; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #4e342e; cursor: pointer; box-shadow: 0 5px 0 #8d6e63, 0 8px 12px rgba(0,0,0,0.15); transition: transform 0.1s, box-shadow 0.1s; text-transform: lowercase; }
  .letter:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #8d6e63, 0 12px 16px rgba(0,0,0,0.2); }
  .letter:active { transform: translateY(2px); box-shadow: 0 3px 0 #8d6e63, 0 4px 8px rgba(0,0,0,0.15); }
  .letter.used { opacity: 0.35; pointer-events: none; transform: scale(0.9); }
  .letter.disabled { pointer-events: none; opacity: 0.5; }
  .controls { display: flex; gap: 14px; margin-top: 4px; }
  .ctrl-btn { background: white; border: 3px solid #9575cd; color: #5e35b1; padding: 8px 20px; border-radius: 22px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 0 #7e57c2; transition: transform 0.1s, box-shadow 0.1s; }
  .ctrl-btn:hover { transform: translateY(-1px); }
  .ctrl-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7e57c2; }
  .ctrl-btn.disabled { opacity: 0.5; pointer-events: none; }
  .status-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); padding: 22px 50px; border-radius: 24px; font-size: 36px; font-weight: 900; z-index: 30; pointer-events: none; text-align: center; white-space: pre-line; }
  .status-banner.show { animation: bannerPop 1.8s ease-out forwards; }
  .status-banner.correct { background: linear-gradient(135deg, #66bb6a, #2e7d32); color: white; box-shadow: 0 12px 30px rgba(46,125,50,0.5); }
  .status-banner.timeout { background: linear-gradient(135deg, #42a5f5, #1565c0); color: white; box-shadow: 0 12px 30px rgba(21,101,192,0.5); }
  @keyframes bannerPop { 0% { transform: translate(-50%,-50%) scale(0); opacity: 0; } 25% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; } 50% { transform: translate(-50%,-50%) scale(1); } 85% { transform: translate(-50%,-50%) scale(1); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0; } }
  .confetti { position: absolute; width: 10px; height: 14px; z-index: 25; pointer-events: none; }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .overlay.hidden { display: none; }
  .panel { background: white; border-radius: 24px; padding: 30px 40px; text-align: center; max-width: 90%; border: 5px solid #ffca28; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
  .panel h1 { color: #f57c00; font-size: 28px; margin-bottom: 10px; }
  .panel .subtitle { color: #666; font-size: 15px; margin-bottom: 18px; }
  .panel .rules { text-align: left; background: #fff8e1; padding: 14px 18px; border-radius: 14px; margin-bottom: 20px; font-size: 14px; color: #555; line-height: 1.8; }
  .big-btn { background: linear-gradient(135deg, #66bb6a, #43a047); color: white; border: none; padding: 14px 40px; border-radius: 40px; font-size: 20px; font-weight: 900; cursor: pointer; font-family: inherit; box-shadow: 0 6px 16px rgba(67,160,71,0.4); }
  .big-btn:hover { transform: scale(1.05); }
  .big-btn:active { transform: scale(0.95); }
  .mute-btn { position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; background: white; border: 3px solid #9c27b0; font-size: 18px; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; }
  .score-display { font-size: 56px; font-weight: 900; color: #f57c00; margin: 10px 0; }
  .score-stars { font-size: 40px; letter-spacing: 4px; margin-bottom: 12px; }
  @media (max-width: 900px) { .sentence { font-size: 22px; } .slot { width: 52px; height: 66px; font-size: 34px; } .letter { width: 50px; height: 50px; font-size: 26px; } }
  @media (max-height: 500px) { .sentence { font-size: 22px; } .slot { width: 54px; height: 66px; font-size: 34px; } .letter { width: 50px; height: 50px; font-size: 26px; } }
</style>

<style>
#_scale_outer{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#1a1a1a;
}
#_scale_inner{
  position:relative;
  width:960px;height:540px;
  transform-origin:top left;
  flex-shrink:0;overflow:hidden;
}
</style>
<script>
(function(){
  var DW=960,DH=540;
  function doScale(){
    var el=document.getElementById('_scale_inner');
    if(!el)return;
    var vw=window.innerWidth,vh=window.innerHeight;
    var s=Math.min(vw/DW,vh/DH);
    var sl=Math.max(0,(vw-DW*s)/2);
    var st=Math.max(0,(vh-DH*s)/2);
    el.style.transform='scale('+s+')';
    el.style.position='absolute';
    el.style.left=sl+'px';
    el.style.top=st+'px';
    document.getElementById('_scale_outer').style.background='#1a1a1a';
  }
  function init(){
    var target=document.querySelector('.stage');
    if(!target)return;
    var outer=document.createElement('div');
    outer.id='_scale_outer';
    var inner=document.createElement('div');
    inner.id='_scale_inner';
    document.body.insertBefore(outer,document.body.firstChild);
    outer.appendChild(inner);
    inner.appendChild(target);
    doScale();
  }
  window.addEventListener('DOMContentLoaded',init);
  window.addEventListener('resize',doScale);
  window.addEventListener('orientationchange',function(){setTimeout(doScale,300);});
})();
</script>

</head>
<body>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<button class="mute-btn" id="muteBtn">🔊</button>
<div class="stage">
  <div class="image-panel">
    <div class="image-frame"><img id="puzzleImg" src="" alt="animal"></div>
    <div class="image-caption">🧐 What do you see?</div>
    <div class="round-indicator" id="roundDots"></div>
  </div>
  <div class="puzzle-panel">
    <div class="timer-row" id="timerRow">
      <span class="timer-icon">⏱️</span>
      <span class="timer-val" id="timerVal">20</span>
      <span style="font-size:18px;color:#666;">sec</span>
    </div>
    <div class="sentence" id="sentenceEl"></div>
    <div class="letter-tray">
      <div class="letter-row" id="letterRow1"></div>
      <div class="letter-row" id="letterRow2" style="display:none"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="clearBtn">↺ Clear</button>
    </div>
  </div>
</div>
<div class="status-banner" id="statusBanner"></div>

<!-- Start overlay -->
<div class="overlay" id="startOverlay">
  <div class="panel">
    <h1>🐑 Animal Fill-in 🐐</h1>
    <div class="subtitle">2 rounds — fill in the missing word!</div>
    <div class="rules">
      <div>👀 Look at the animal picture on the left</div>
      <div>🔤 Tap letters to fill the blank</div>
      <div>🔁 Tap a filled letter to remove it</div>
      <div>⏱️ Each letter = 5 seconds (sheep=25s, goat=20s)</div>
      <div>🏆 Correct: sheep/goat = 20 pts each</div>
    </div>
    <button class="big-btn" id="startBtn">Let's Go! 🚀</button>
  </div>
</div>

<!-- End overlay -->
<div class="overlay hidden" id="endOverlay">
  <div class="panel">
    <h1 id="endTitle">🎉 All done!</h1>
    <div class="score-display" id="endScore"></div>
    <div class="score-stars" id="endStars"></div>
    <div class="subtitle" id="endSubtitle"></div>
    <button class="big-btn" id="playAgainBtn">Play Again 🔁</button>
  </div>
</div>

const ROUNDS = [
  { answer: 'sheep', img: SHEEP_IMAGE, sentBefore: 'The', sentAfter: 'is white and cute.' },
  { answer: 'goat',  img: GOAT_IMAGE,  sentBefore: 'The', sentAfter: 'is on the mountain.' },
];
const TOTAL_LETTERS = 10;

const DISTRACTOR_POOL = ['a','b','c','d','f','i','j','k','l','m','n','q','r','u','v','w','x','y','z'];

let currentRound = 0;
let roundScores  = [];
let state = { slots:[], letters:[], time:0, timerInterval:null, running:false, muted:false, solved:false };

const letterRow2   = $('letterRow2');

// ── Audio ──
let audioCtx = null, masterGain = null;
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
  } catch(e) {}
}
function tone(freq, dur, type='sine', vol=0.3, delay=0) {
  if (!audioCtx || state.muted) return;
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(masterGain);
  osc.start(t); osc.stop(t + dur + 0.05);
}
function sfxPick()    { tone(700, 0.12, 'triangle', 0.25); }
function sfxRemove()  { tone(350, 0.12, 'triangle', 0.2); }
function sfxCorrect() {
  tone(523, 0.18, 'triangle', 0.3);
  tone(659, 0.18, 'triangle', 0.3, 0.12);
  tone(784, 0.25, 'triangle', 0.3, 0.24);
  tone(1047,0.35, 'triangle', 0.3, 0.4);
}
function sfxWrong()   { tone(300, 0.12, 'square', 0.2); tone(220, 0.18, 'square', 0.2, 0.1); }
function sfxTimeout() { tone(400, 0.15, 'sawtooth', 0.2); tone(300, 0.2, 'sawtooth', 0.2, 0.15); tone(200, 0.35, 'sawtooth', 0.2, 0.3); }
function sfxTick()    { tone(900, 0.06, 'sine', 0.12); }

// ── Helpers ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildLetters(answer) {
  return shuffle(answer.split(''));
}

// ── UI ──
function renderDots() {
  roundDots.innerHTML = '';
  ROUNDS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'round-dot' +
      (i < currentRound  ? ' done'   :
       i === currentRound ? ' active' : '');
    roundDots.appendChild(d);
  });
}

function renderSentence(round) {
  sentenceEl.innerHTML = '';
  const s1 = document.createElement('span');
  s1.textContent = round.sentBefore + ' ';
  sentenceEl.appendChild(s1);
  const br = document.createElement('span');
  br.id = 'blankRowEl';
  br.className = 'blank-row';
  sentenceEl.appendChild(br);
  const s2 = document.createElement('span');
  s2.textContent = ' ' + round.sentAfter;
  sentenceEl.appendChild(s2);
}

function getBlankRow() { return $('blankRowEl'); }

function renderSlots() {
  const br = getBlankRow();
  br.innerHTML = '';
  state.slots.forEach((slot, i) => {
    const div = document.createElement('div');
    div.className = 'slot' + (slot.letter ? ' filled' : '');
    div.textContent = slot.letter || '';
    div.dataset.slot = i;
    div.addEventListener('click', () => onSlotClick(i));
    br.appendChild(div);
  });
}

function renderLetters() {
  letterRow1.innerHTML = '';
  letterRow2.innerHTML = '';
  state.letters.forEach((L, idx) => {
    const div = document.createElement('div');
    div.className = 'letter' + (L.used ? ' used' : '');
    div.textContent = L.char;
    div.dataset.idx = idx;
    div.addEventListener('click', () => onLetterClick(idx));
    letterRow1.appendChild(div);
  });
}

// ── Game logic ──
function onLetterClick(letterIdx) {
  if (!state.running || state.solved) return;
  const L = state.letters[letterIdx];
  if (L.used) return;
  const slotIdx = state.slots.findIndex(s => s.letter === null);
  if (slotIdx === -1) return;
  state.slots[slotIdx] = { letterIdx, letter: L.char };
  L.used = true;
  sfxPick();
  renderSlots(); renderLetters();
  checkComplete();
}

function onSlotClick(slotIdx) {
  if (!state.running || state.solved) return;
  const slot = state.slots[slotIdx];
  if (slot.letter === null) return;
  const L = state.letters[slot.letterIdx];
  if (L) L.used = false;
  state.slots[slotIdx] = { letterIdx: null, letter: null };
  sfxRemove();
  renderSlots(); renderLetters();
  getBlankRow().querySelectorAll('.slot.wrong').forEach(el => el.classList.remove('wrong'));
}

function clearAll() {
  if (!state.running || state.solved) return;
  let any = false;
  state.slots.forEach((slot, i) => {
    if (slot.letter !== null) {
      const L = state.letters[slot.letterIdx];
      if (L) L.used = false;
      state.slots[i] = { letterIdx: null, letter: null };
      any = true;
    }
  });
  if (any) { sfxRemove(); renderSlots(); renderLetters(); }
}

function checkComplete() {
  if (state.slots.some(s => s.letter === null)) return;
  const word   = state.slots.map(s => s.letter).join('');
  const ANSWER = ROUNDS[currentRound].answer;
  if (word === ANSWER) onCorrect();
  else onWrong();
}

function onCorrect() {
  state.solved = true; state.running = false;
  clearInterval(state.timerInterval);
  timerRow.classList.remove('warning');
  sfxCorrect();
  getBlankRow().querySelectorAll('.slot').forEach(el => {
    el.classList.remove('filled', 'wrong');
    el.classList.add('correct');
  });
  letterRow1.querySelectorAll('.letter').forEach(el => el.classList.add('disabled'));
  letterRow2.querySelectorAll('.letter').forEach(el => el.classList.add('disabled'));
  clearBtn.classList.add('disabled');
  const answer = ROUNDS[currentRound].answer;
  const pts = SCORES[answer] || 20;
  roundScores.push(pts);
  showBanner('🎉 +' + pts + ' pts! 🎉', 'correct');
  confettiBurst();
  setTimeout(nextRoundOrEnd, 2200);
}

function onWrong() {
  sfxWrong();
  const slotEls = getBlankRow().querySelectorAll('.slot');
  slotEls.forEach(el => el.classList.add('wrong'));
  setTimeout(() => {
    if (state.solved) return;
    slotEls.forEach(el => el.classList.remove('wrong'));
    clearAll();
  }, 600);
}

function onTimeout() {
  if (state.solved) return;
  state.running = false;
  clearInterval(state.timerInterval);
  timerRow.classList.remove('warning');
  sfxTimeout();
  const ANSWER = ROUNDS[currentRound].answer;
  state.slots = ANSWER.split('').map(ch => ({ letterIdx: null, letter: ch, revealed: true }));
  state.letters.forEach(L => L.used = true);
  renderLetters();
  const br = getBlankRow();
  br.innerHTML = '';
  ANSWER.split('').forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'slot revealed';
    div.textContent = ch;
    div.style.animationDelay = (i * 0.15) + 's';
    br.appendChild(div);
  });
  clearBtn.classList.add('disabled');
  roundScores.push(0);
  showBanner("⏰ Time's up!\nAnswer shown in blue.", 'timeout');
  setTimeout(nextRoundOrEnd, 2800);
}

function nextRoundOrEnd() {
  currentRound++;
  if (currentRound < ROUNDS.length) startRound();
  else showEnd();
}

function showBanner(text, type) {
  statusBanner.className = 'status-banner ' + type;
  statusBanner.textContent = text;
  void statusBanner.offsetWidth;
  statusBanner.classList.add('show');
}

function confettiBurst() {
  const colors = ['#f44336','#ff9800','#ffc107','#4caf50','#2196f3','#9c27b0'];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.left = cx + 'px'; c.style.top = cy + 'px';
    const angle = Math.random() * Math.PI * 2;
    const speed = 150 + Math.random() * 250;
    const dx = Math.cos(angle) * speed, dy = Math.sin(angle) * speed;
    c.animate([
      { transform: `translate(0,0) rotate(0)`, opacity: 1 },
      { transform: `translate(${dx}px,${dy + 200}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
    ], { duration: 1400 + Math.random() * 600, easing: 'cubic-bezier(.2,.7,.5,1)' });
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2200);
  }
}

function startTimer() {
  const round = ROUNDS[currentRound];
  state.time = round.answer.length * PER_LETTER_TIME;
  timerVal.textContent = state.time;
  timerRow.classList.remove('warning');
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.time--;
    timerVal.textContent = state.time;
    if (state.time <= 5 && state.time > 0) { timerRow.classList.add('warning'); sfxTick(); }
    if (state.time <= 0) { clearInterval(state.timerInterval); onTimeout(); }
  }, 1000);
}

function startRound() {
  const round = ROUNDS[currentRound];
  statusBanner.classList.remove('show');
  state.solved = false; state.running = true;
  clearBtn.classList.remove('disabled');
  puzzleImg.src = round.img;
  renderDots();
  renderSentence(round);
  const letters = buildLetters(round.answer);
  state.letters = letters.map((char, idx) => ({ char, used: false, idx }));
  state.slots   = round.answer.split('').map(() => ({ letterIdx: null, letter: null }));
  renderSlots();
  renderLetters();
  startTimer();
}

function startGame() {
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  currentRound = 0;
  roundScores  = [];
  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');
  startRound();
}

function showEnd() {
  const totalScore = roundScores.reduce((sum, s) => sum + s, 0);
  const correctCount = roundScores.filter(s => s > 0).length;
  $('endTitle').textContent   = '🏆 Final Score: ' + totalScore + ' pts!';
  $('endScore').textContent   = totalScore;
  $('endStars').textContent   = correctCount === 2 ? '⭐⭐' : correctCount === 1 ? '⭐' : '💪';
  $('endSubtitle').textContent = correctCount === 2
    ? 'Perfect! You got all words right!'
    : correctCount === 1 ? 'Good job! You got ' + correctCount + ' out of 2 correct.'
    : 'Keep practising — you can do it!';
  endOverlay.classList.remove('hidden');
}

startBtn.addEventListener('click', startGame);
playAgainBtn.addEventListener('click', startGame);
clearBtn.addEventListener('click', clearAll);
muteBtn.addEventListener('click', () => {
  state.muted = !state.muted;
  muteBtn.textContent = state.muted ? '🔇' : '🔊';
  if (masterGain) masterGain.gain.value = state.muted ? 0 : 0.5;
});
</script>
</body>
</html>
